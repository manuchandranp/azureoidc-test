steps:
- task: JfrogCliV2@1
  name: jfrogSetup
  inputs:
    jfrogPlatformConnection: 'hts2'
    # It's good practice to keep the setup task focused on configuration
    command: 'jf rt ping' 

- task: JfrogCliV2@1
  displayName: 'Download Artifacts from Artifactory'
  inputs:
    jfrogPlatformConnection: 'hts2'
    command: |
      jf rt dl "manu-generic-local/microsoft.testplatform.testhost.18.0.1.nupkg"
      jf helm repo add ganavik-helm https://hts2.jfrog.io/artifactory/api/helm/ganavik-helm